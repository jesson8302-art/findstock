name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 프론트엔드 빌드 확인 (Netlify가 실제 배포는 자동으로 함) ─────────────
  frontend-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install
      - run: npm run build
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}

  # ── 백엔드 문법 체크 (Render가 실제 배포는 자동으로 함) ─────────────────
  backend-check:
    name: Backend Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt --quiet
      - run: python -m py_compile app.py gemini_client.py indicators.py data_collector.py
